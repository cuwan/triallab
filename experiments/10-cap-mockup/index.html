<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cap Mockup Showcase</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            text-align: center;
            padding: 2rem;
        }

        .mockup-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cap-image-container {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
        }

        .cap-image {
            width: 100%;
            display: block;
            border-radius: 12px;
        }

        .logo-layer {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            mix-blend-mode: multiply;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-color);
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Cap Mockup Laboratory</h1>
        <p>Experimenting with photorealistic product visualization</p>

        <div class="mockup-card">
            <div class="cap-image-container">
                <img src="baseball_cap_mockup_v1.png" alt="Mockup Cap" class="cap-image">
                <!-- Logo placeholder for experiment -->
                <div id="logo" class="logo-layer">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" stroke="#1e293b" stroke-width="10" />
                        <path d="M30 50L45 65L70 35" stroke="#1e293b" stroke-width="10" stroke-linecap="round" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="changeColor('multiply')">Multiply Mode</button>
            <button class="btn" onclick="changeColor('overlay')">Overlay Mode</button>
            <button class="btn" onclick="reset()">Reset</button>
        </div>
    </div>

    <script>
        function changeColor(mode) {
            document.getElementById('logo').style.mixBlendMode = mode;
        }
        function reset() {
            document.getElementById('logo').style.mixBlendMode = 'multiply';
        }
    </script>
</body>

</html>
