<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Orchestrator Pro</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=JetBrains+Mono&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000000;
            --sidebar-bg: #0A0A0A;
            --card-bg: #111111;
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --border: rgba(255, 255, 255, 0.06);
            --text-dim: #666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 1. Slim Sidebar (Icons only) */
        .side-nav {
            width: 70px;
            background: #000;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 20px;
        }

        .nav-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-icon:hover,
        .nav-icon.active {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
        }

        /* 2. Control Panel (The Settings) */
        .controls {
            width: 350px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 14px;
            letter-spacing: 4px;
            font-weight: 900;
        }

        .header span {
            font-size: 9px;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 2px;
        }

        .tab-content {
            padding: 25px;
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .tab-content.active {
            display: flex;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        textarea {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            resize: none;
            font-size: 13px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--gold);
            height: 4px;
            appearance: none;
            background: #222;
            border-radius: 2px;
        }

        .btn-main {
            background: var(--gold);
            color: black;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--gold-glow);
        }

        /* 3. Main Stage */
        .stage {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #render-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #render-frame {
            width: 1920px;
            height: 1080px;
            position: relative;
            transform-origin: center center;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .draw-text {
            font-family: 'Dancing Script', cursive;
            fill: transparent;
            stroke: url(#goldGradient);
            stroke-width: 2px;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            opacity: 0;
        }

        .animate-stroke {
            opacity: 1;
        }

        @keyframes drawLine {
            0% {
                stroke-dashoffset: 1000;
            }

            100% {
                stroke-dashoffset: 0;
            }
        }

        @keyframes fillGold {
            0% {
                fill: transparent;
                stroke-width: 2px;
            }

            100% {
                fill: url(#goldGradient);
                stroke-width: 0px;
            }
        }

        /* Ink Splatter */
        .ink-splat {
            position: absolute;
            background: radial-gradient(circle, #FFD700 0%, #D4AF37 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.9);
        }

        @keyframes splatter {
            0% {
                transform: scale(0);
                opacity: 1;
            }

            100% {
                transform: scale(1.5) translate(var(--tx), var(--ty));
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- 1. SIDE NAV -->
    <div class="side-nav">
        <div class="nav-icon active" onclick="switchTab('studio', this)" title="Orchestrator">
            <i data-lucide="layout-dashboard"></i>
        </div>
        <div class="nav-icon" onclick="switchTab('style-a', this)" title="Style Accelerated">
            <i data-lucide="zap"></i>
        </div>
        <div class="nav-icon" onclick="switchTab('style-b', this)" title="Style Sequential">
            <i data-lucide="layers"></i>
        </div>
        <div class="nav-icon" onclick="switchTab('gemini', this)" title="AI Info">
            <i data-lucide="bot"></i>
        </div>
    </div>

    <!-- 2. CONTROL PANEL -->
    <div class="controls">
        <div class="header">
            <h1>ORCHESTRATOR</h1>
            <span>VERSION 2.5 PRO</span>
        </div>

        <!-- TAB: STUDIO -->
        <div id="tab-studio" class="tab-content active">
            <div class="card">
                <label>Input Sequence</label>
                <textarea id="val-text" rows="3" oninput="updatePreview()">Happy
Independent
Day</textarea>
            </div>
            <div class="card">
                <label>Typography <span id="label-size">240</span>px</label>
                <input type="range" id="val-size" min="50" max="600" value="240" oninput="updatePreview('size')">
            </div>
            <div class="card">
                <label>Line Height <span id="label-lineheight">300</span>px</label>
                <input type="range" id="val-lineheight" min="100" max="600" value="300"
                    oninput="updatePreview('lineheight')">
            </div>
            <button class="btn-main" onclick="startAnimation()">
                <i data-lucide="play"></i> Run Motion
            </button>
        </div>

        <!-- TAB: STYLE A -->
        <div id="tab-style-a" class="tab-content">
            <div class="card" style="border-left: 4px solid #A855F7;">
                <label style="color:#A855F7">ACCELERATED PRESET (GIF 1)</label>
                <p style="font-size: 11px; color:#888; line-height: 1.5;">Analisa Vision: Huruf awal lambat, huruf akhir
                    cepat sekali. Kurva Logaritmik Aktif.</p>
                <button class="btn-main" style="background:#A855F7; color:white;" onclick="applyPreset('accel')">Apply
                    Style A</button>
            </div>
        </div>

        <!-- TAB: STYLE B -->
        <div id="tab-style-b" class="tab-content">
            <div class="card" style="border-left: 4px solid #22C55E;">
                <label style="color:#22C55E">SPRING SEQUENTIAL (GIF 2)</label>
                <p style="font-size: 11px; color:#888; line-height: 1.5;">Analisa Vision: Jeda antar huruf konsisten
                    dengan efek pegas pada setiap stroke.</p>
                <button class="btn-main" style="background:#22C55E; color:white;" onclick="applyPreset('organic')">Apply
                    Style B</button>
            </div>
        </div>

        <!-- TAB: AI INFO -->
        <div id="tab-gemini" class="tab-content">
            <div class="card">
                <label>Gemini 3.1 Vision</label>
                <p style="font-size: 11px; color:#666;">Multimodal Engine aktif. Telah memproses 2 GIF untuk ekstraksi
                    timing motion.</p>
            </div>
        </div>
    </div>

    <!-- 3. STAGE -->
    <div class="stage">
        <div id="render-container">
            <div id="render-frame">
                <svg viewBox="0 0 1920 1080" id="text-svg">
                    <defs>
                        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FFEAA7" />
                            <stop offset="25%" stop-color="#D4AF37" />
                            <stop offset="50%" stop-color="#996515" />
                            <stop offset="75%" stop-color="#D4AF37" />
                            <stop offset="100%" stop-color="#FFF3A1" />
                        </linearGradient>
                        <filter id="premiumGlow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur1" />
                            <feComponentTransfer in="blur1" result="blur2">
                                <feFuncA type="linear" slope="0.6" />
                            </feComponentTransfer>
                            <feFlood flood-color="#D4AF37" result="color" />
                            <feComposite in="color" in2="blur2" operator="in" />
                            <feMerge>
                                <feMergeNode />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>
                    <g id="svg-content-group" filter="url(#premiumGlow)"></g>
                </svg>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let currentPreset = 'accel';

        function switchTab(tabId, el) {
            document.querySelectorAll('.nav-icon').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(`tab-${tabId}`).style.display = 'flex';
        }

        function applyPreset(mode) {
            currentPreset = mode;
            switchTab('studio', document.querySelector('.nav-icon'));
            startAnimation();
        }

        function updatePreview(id) {
            if (id) document.getElementById(`label-${id}`).innerText = document.getElementById(`val-${id}`).value;
            updateSVGNodes();
        }

        function updateSVGNodes() {
            const rawText = document.getElementById('val-text').value;
            const container = document.getElementById('svg-content-group');
            container.innerHTML = '';

            const lines = rawText.split('\n');
            const fontSize = document.getElementById('val-size').value;
            const lineHeight = document.getElementById('val-lineheight').value;

            let startY = 540 - ((lines.length - 1) * lineHeight) / 2;
            let globalCharIndex = 0;

            lines.forEach((lineText, lineIdx) => {
                const yPos = startY + (lineIdx * lineHeight);
                const textWrapper = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                textWrapper.setAttribute('x', '50%');
                textWrapper.setAttribute('y', yPos);
                textWrapper.setAttribute('text-anchor', 'middle');
                textWrapper.style.fontSize = fontSize + 'px';

                [...lineText].forEach(char => {
                    const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
                    tspan.textContent = char;
                    tspan.setAttribute('class', 'draw-text');
                    tspan.setAttribute('data-index', globalCharIndex);
                    if (char === ' ') tspan.setAttribute('xml:space', 'preserve');
                    textWrapper.appendChild(tspan);
                    globalCharIndex++;
                });
                container.appendChild(textWrapper);
            });
        }

        function startAnimation() {
            document.querySelectorAll('.ink-splat').forEach(s => s.remove());
            const chars = document.querySelectorAll('.draw-text');
            const total = chars.length;

            chars.forEach(c => {
                c.classList.remove('animate-stroke');
                c.style.animation = 'none';
                void c.offsetWidth;
            });

            chars.forEach(char => {
                const idx = parseInt(char.getAttribute('data-index'));
                if (!char.textContent.trim()) return;

                let delay = 0;
                let duration = 1.2;
                let easing = 'cubic-bezier(0.22, 1, 0.36, 1)';

                if (currentPreset === 'accel') {
                    delay = Math.pow(idx / total, 1.5) * (total * 150);
                } else {
                    delay = idx * 100;
                    duration = 1.4;
                    easing = 'cubic-bezier(0.34, 1.56, 0.64, 1)';
                }

                setTimeout(() => {
                    char.style.animation = `drawLine ${duration}s ${easing} forwards, fillGold 0.8s ease-in-out ${duration}s forwards`;
                    char.classList.add('animate-stroke');

                    setTimeout(() => {
                        const bbox = char.getBoundingClientRect();
                        const fr = document.getElementById('render-frame').getBoundingClientRect();
                        const scale = 1920 / fr.width;
                        createSplatter((bbox.right - fr.left) * scale, (bbox.top + bbox.height / 2 - fr.top) * scale);
                    }, duration * 1000 + 400);
                }, delay);
            });
        }

        function createSplatter(x, y) {
            for (let i = 0; i < 6; i++) {
                const s = document.createElement('div');
                s.className = 'ink-splat';
                s.style.width = s.style.height = (Math.random() * 8 + 4) + 'px';
                s.style.left = x + 'px'; s.style.top = y + 'px';
                s.style.setProperty('--tx', (Math.random() - 0.5) * 120 + 'px');
                s.style.setProperty('--ty', (Math.random() - 0.5) * 120 + 'px');
                s.style.animation = `splatter 0.6s ease-out forwards`;
                document.getElementById('render-frame').appendChild(s);
                setTimeout(() => s.remove(), 600);
            }
        }

        const cont = document.getElementById('render-container');
        const frame = document.getElementById('render-frame');
        function scale() {
            const s = Math.min((cont.clientWidth - 80) / 1920, (cont.clientHeight - 80) / 1080);
            frame.style.transform = `scale(${s})`;
        }
        window.addEventListener('resize', scale);
        new ResizeObserver(scale).observe(cont);
        updatePreview();
    </script>
</body>

</html>
