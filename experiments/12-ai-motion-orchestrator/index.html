<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Independent Day | True SVG Handwriting</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;800&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505;
            --gold: #D4AF37;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Controls */
        aside {
            width: 300px;
            border-right: 1px solid var(--border);
            padding: 24px;
            background: #000;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .export-specs {
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            font-size: 11px;
            color: #AAA;
        }

        .export-specs strong {
            color: var(--gold);
        }

        /* Stage */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            position: relative;
        }

        #capture-area {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: 100%;
            max-width: 1200px;
        }

        .draw-text {
            font-family: 'Dancing Script', cursive;
            font-size: 120px;
            fill: transparent;
            stroke: url(#goldGradient);
            stroke-width: 2px;
            stroke-dasharray: 800;
            stroke-dashoffset: 800;
            opacity: 0;
        }

        .draw-text.animate-stroke {
            opacity: 1;
            animation: drawLine 2.5s ease-in-out forwards, fillGold 1s ease-in-out 2.5s forwards;
        }

        @keyframes drawLine {
            0% {
                stroke-dashoffset: 800;
            }

            100% {
                stroke-dashoffset: 0;
            }
        }

        @keyframes fillGold {
            0% {
                fill: transparent;
                filter: drop-shadow(0 0 0px transparent);
                stroke-width: 2px;
            }

            100% {
                fill: url(#goldGradient);
                filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
                stroke-width: 0px;
            }
        }

        /* Ink Splatter */
        .ink-splat {
            position: absolute;
            background: radial-gradient(circle, #FFD700 0%, #D4AF37 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
        }

        @keyframes splatter {
            0% {
                transform: scale(0) translate(0, 0);
                opacity: 1;
            }

            100% {
                transform: scale(1.5) translate(var(--tx), var(--ty));
                opacity: 0;
            }
        }

        .log-box {
            position: absolute;
            bottom: 30px;
            left: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>

<body>
    <aside>
        <div style="font-weight: 800; color: var(--gold); display: flex; align-items: center; gap: 8px;">
            <i data-lucide="pen-tool"></i> TRUE SVG MOTION
        </div>

        <div class="export-specs">
            <strong>Target Export Specs:</strong><br>
            • Resolution: 4K (3840x2160)<br>
            • Frame Rate: 30 FPS<br>
            • Duration: 10 Seconds<br>
            • Target Size: ~30MB<br>
            • Quality: High Fidelity (CRF 18)
        </div>

        <button onclick="startAnimation()"
            style="background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer;">
            REPLAY ANIMATION
        </button>
    </aside>

    <main id="capture-area">
        <svg viewBox="0 0 1200 800" id="text-svg">
            <defs>
                <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#BF953F" />
                    <stop offset="25%" stop-color="#FCF6BA" />
                    <stop offset="50%" stop-color="#B38728" />
                    <stop offset="75%" stop-color="#FBF5B7" />
                    <stop offset="100%" stop-color="#AA771C" />
                </linearGradient>
            </defs>
            <text x="50%" y="250" text-anchor="middle" class="draw-text" id="line1" data-delay="0">Happy</text>
            <text x="50%" y="450" text-anchor="middle" class="draw-text" id="line2" data-delay="2500">Independent</text>
            <text x="50%" y="650" text-anchor="middle" class="draw-text" id="line3" data-delay="5000">Day</text>
        </svg>

        <div class="log-box">AI EXECUTION: TRUE_SVG_STROKE_ANIMATION</div>
    </main>

    <script>
        lucide.createIcons();

        function createSplatter(x, y) {
            for (let i = 0; i < 12; i++) {
                const splat = document.createElement('div');
                splat.className = 'ink-splat';
                const size = Math.random() * 6 + 2;
                splat.style.width = size + 'px';
                splat.style.height = size + 'px';
                splat.style.left = x + 'px';
                splat.style.top = y + 'px';

                // Random trajectory for the splatter
                const tx = (Math.random() - 0.5) * 100 + 'px';
                const ty = (Math.random() - 0.5) * 100 + 'px';
                splat.style.setProperty('--tx', tx);
                splat.style.setProperty('--ty', ty);

                splat.style.animation = `splatter ${0.4 + Math.random() * 0.4}s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
                document.getElementById('capture-area').appendChild(splat);
                setTimeout(() => splat.remove(), 1000);
            }
        }

        function startAnimation() {
            const lines = document.querySelectorAll('.draw-text');

            // Reset
            lines.forEach(line => {
                line.classList.remove('animate-stroke');
                void line.offsetWidth; // trigger reflow
            });

            lines.forEach((line, index) => {
                const delay = parseInt(line.getAttribute('data-delay'));

                setTimeout(() => {
                    line.classList.add('animate-stroke');

                    // Create ink splatters when the fill color kicks in
                    setTimeout(() => {
                        const rect = line.getBoundingClientRect();
                        // Splatter randomly across the word's bounding box to simulate completing strokes
                        createSplatter(rect.right - 50, rect.bottom - 20);
                        createSplatter(rect.left + rect.width / 2, rect.top + rect.height / 2);
                    }, 2500); // 2.5s is when the drawLine animation ends and fillGold starts

                }, delay);
            });
        }

        // Auto start
        setTimeout(startAnimation, 500);
    </script>
</body>

</html>
