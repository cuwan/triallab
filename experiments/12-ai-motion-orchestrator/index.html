<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Motion Engine 4K</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;800&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505;
            --gold: #D4AF37;
            --gold-light: #FBF5B7;
            --border: rgba(255, 255, 255, 0.1);
            --panel-bg: #111111;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Editor Panel */
        aside {
            width: 320px;
            border-right: 1px solid var(--border);
            padding: 24px;
            background: var(--panel-bg);
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.3s;
        }

        /* Mobile Adjustments */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 50;
            background: var(--gold);
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .mobile-toggle {
                display: block;
            }

            body {
                flex-direction: column;
            }

            aside {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
            }

            aside.open {
                transform: translateX(0);
            }
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-group label {
            font-size: 12px;
            color: #AAA;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        .control-group input[type="text"],
        .control-group textarea {
            background: #000;
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-family: inherit;
        }

        .control-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: var(--gold);
        }

        .btn-action {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-action:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
        }

        .btn-outline:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .align-group {
            display: flex;
            gap: 5px;
        }

        .align-btn {
            flex: 1;
            padding: 8px;
            background: #000;
            border: 1px solid var(--border);
            color: #888;
            cursor: pointer;
            border-radius: 4px;
        }

        .align-btn.active {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* Stage */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            position: relative;
            overflow: hidden;
            /* Avoid scrollbars on main */
        }

        /* Resolution Frame for 4K */
        #render-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #render-frame {
            position: relative;
            background: transparent;
            width: 1920px;
            height: 1080px;
            flex-shrink: 0;
            /* transform diformulasikan via JS agar presisi sesuai layar */
            transform-origin: center center;
            display: flex;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            overflow: hidden;
            /* pastikan konten tidak keluar frame resolusi video */
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .draw-text {
            font-family: 'Dancing Script', cursive;
            fill: transparent;
            stroke: url(#goldGradient);
            stroke-width: 2px;
            /* Per parameter akan diupdate via JS */
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            opacity: 0;
            /* Filter glow di-apply di group level via SVG fiter, bukan drop-shadow CSS lagi */
        }

        .draw-text.animate-stroke {
            opacity: 1;
            animation: drawLine 1s ease-in-out forwards, fillGold 0.8s ease-in-out 1s forwards;
        }

        @keyframes drawLine {
            0% {
                stroke-dashoffset: 1000;
            }

            100% {
                stroke-dashoffset: 0;
            }
        }

        @keyframes fillGold {
            0% {
                fill: transparent;
                stroke-width: 2px;
            }

            100% {
                fill: url(#goldGradient);
                stroke-width: 0px;
            }
        }

        /* Ink Splatter */
        .ink-splat {
            position: absolute;
            background: radial-gradient(circle, #FFD700 0%, #D4AF37 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.9);
        }

        @keyframes splatter {
            0% {
                transform: scale(0) translate(0, 0);
                opacity: 1;
            }

            100% {
                transform: scale(1.5) translate(var(--tx), var(--ty));
                opacity: 0;
            }
        }

        #render-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
        }

        .progress-bar-container {
            width: 400px;
            height: 10px;
            background: #222;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--gold);
            transition: 0.2s;
        }
    </style>
</head>

<body>
    <button class="mobile-toggle" onclick="document.querySelector('aside').classList.toggle('open')">
        <i data-lucide="menu"></i>
    </button>

    <!-- EDITOR PANEL -->
    <aside>
        <div style="font-weight: 800; color: var(--gold); display: flex; align-items: center; gap: 8px;">
            <i data-lucide="sliders"></i> SVG ENGINE CONTROLS
        </div>
        <button onclick="document.querySelector('aside').classList.remove('open')" class="mobile-toggle"
            style="position: static; box-shadow: none; margin-bottom: 20px;">
            <i data-lucide="x"></i> Close Panel
        </button>

        <div class="control-group">
            <label>Text Content</label>
            <textarea id="val-text" oninput="updatePreview()">Happy
Independent
Day</textarea>
        </div>

        <div class="control-group">
            <label>Alignment</label>
            <div class="align-group">
                <button class="align-btn" onclick="setAlign('start')"><i data-lucide="align-left"></i></button>
                <button class="align-btn active" onclick="setAlign('middle')"><i
                        data-lucide="align-center"></i></button>
                <button class="align-btn" onclick="setAlign('end')"><i data-lucide="align-right"></i></button>
            </div>
            <input type="hidden" id="val-align" value="middle">
        </div>

        <div class="control-group">
            <label>Font Size <span><span id="label-size">240</span>px</span></label>
            <input type="range" id="val-size" min="50" max="600" value="240" oninput="updatePreview('size')">
        </div>

        <div class="control-group">
            <label>Kerning (Spacing) <span><span id="label-spacing">0</span>px</span></label>
            <input type="range" id="val-spacing" min="-20" max="100" value="0" oninput="updatePreview('spacing')">
        </div>

        <div class="control-group">
            <label>Line Height <span><span id="label-lineheight">300</span>px</span></label>
            <input type="range" id="val-lineheight" min="100" max="800" value="300"
                oninput="updatePreview('lineheight')">
        </div>

        <div class="control-group">
            <label>Outer Glow <span><span id="label-og-size">15</span>px | <span
                        id="label-og-opacity">0.6</span></span></label>
            <div style="display:flex; gap:10px;">
                <input type="range" id="val-og-size" min="0" max="50" value="15" oninput="updateGlow()">
                <input type="range" id="val-og-opacity" min="0" max="1" step="0.1" value="0.6" oninput="updateGlow()"
                    style="width: 50%;">
            </div>
        </div>

        <div class="control-group">
            <label>Inner Glow <span><span id="label-ig-size">3</span>px | <span
                        id="label-ig-opacity">0.5</span></span></label>
            <div style="display:flex; gap:10px;">
                <input type="range" id="val-ig-size" min="0" max="15" value="3" oninput="updateGlow()">
                <input type="range" id="val-ig-opacity" min="0" max="1" step="0.1" value="0.5" oninput="updateGlow()"
                    style="width: 50%;">
            </div>
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <button class="btn-action btn-outline" onclick="startAnimation()">
                <i data-lucide="play-circle"></i> PREVIEW ANIMATION
            </button>
            <button class="btn-action" onclick="simulateRender()">
                <i data-lucide="download"></i> RENDER 4K SEQUENCE
            </button>
        </div>
    </aside>

    <!-- PREVIEW AREA -->
    <main>
        <div id="render-container">
            <div id="render-frame">
                <svg viewBox="0 0 1920 1080" id="text-svg">
                    <defs>
                        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FFEAA7" />
                            <stop offset="25%" stop-color="#D4AF37" />
                            <stop offset="50%" stop-color="#996515" />
                            <stop offset="75%" stop-color="#D4AF37" />
                            <stop offset="100%" stop-color="#FFF3A1" />
                        </linearGradient>

                        <filter id="premiumGlow" x="-50%" y="-50%" width="200%" height="200%">
                            <!-- Outer Glow -->
                            <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur1" id="fe-blur" />
                            <feComponentTransfer in="blur1" result="blur2">
                                <feFuncA type="linear" slope="0.6" id="fe-opacity" />
                            </feComponentTransfer>
                            <feFlood flood-color="#D4AF37" result="color" />
                            <feComposite in="color" in2="blur2" operator="in" result="outerGlow" />

                            <!-- Inner Glow (menggunakan efek highlight/brightening pada stroke/fill) -->
                            <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="innerBlur" id="fe-inner-blur" />
                            <feFlood flood-color="#FFFFFF" result="innerColor" />
                            <feComposite in="innerColor" in2="innerBlur" operator="in" result="innerGlowUnmasked" />
                            <!-- Mask dengan graphic asli supaya jadi inner -->
                            <feComposite in="innerGlowUnmasked" in2="SourceAlpha" operator="in" result="innerGlow" />
                            <feComponentTransfer in="innerGlow" result="innerGlowAdjusted">
                                <feFuncA type="linear" slope="0.5" id="fe-inner-opacity" />
                            </feComponentTransfer>

                            <!-- Merge the glows and graphic -->
                            <feMerge>
                                <feMergeNode in="outerGlow" />
                                <feMergeNode in="SourceGraphic" />
                                <feMergeNode in="innerGlowAdjusted" />
                            </feMerge>
                        </filter>
                    </defs>
                    <g id="svg-content-group" filter="url(#premiumGlow)">
                        <!-- Text path elements will be injected here per letter -->
                    </g>
                </svg>
            </div>
        </div>
    </main>

    <!-- RENDER OVERLAY -->
    <div id="render-overlay">
        <i data-lucide="cpu" color="#D4AF37" size="48" class="animate-pulse"></i>
        <h2 style="color: white; margin-top: 20px;">Rendering 4K PNG Sequence (Alpha)</h2>
        <p style="color: #888;">Extracting SVG vector paths to raster frames (30fps)...</p>
        <div class="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Responsive Frame Scaling
        const container = document.getElementById('render-container');
        const frame = document.getElementById('render-frame');

        function scaleFrame() {
            // Kita ingin memuat frame 1920x1080 ke dalam container yang tersedia
            // dengan padding 40px
            const padding = 40;
            const targetWidth = container.clientWidth - (padding * 2);
            const targetHeight = container.clientHeight - (padding * 2);

            // Hitung rasio scale untuk lebar dan tinggi
            const scaleX = targetWidth / 1920;
            const scaleY = targetHeight / 1080;

            // Ambil scale terkecil agar fit (letterbox)
            const scale = Math.min(scaleX, scaleY);

            // Terapkan scale minimal 0.1 agar tidak error
            frame.style.transform = `scale(${Math.max(0.1, scale)})`;
        }

        // Pantau perubahan ukuran layar
        new ResizeObserver(scaleFrame).observe(container);
        window.addEventListener('resize', scaleFrame);

        // UI Control Updates
        function setAlign(align) {
            document.querySelectorAll('.align-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('val-align').value = align;
            updatePreview();
        }

        function createSplatter(x, y) {
            for (let i = 0; i < 8; i++) {
                const splat = document.createElement('div');
                splat.className = 'ink-splat';

                // Scale splat size relatively to the frame scale
                const size = Math.random() * 10 + 4;
                splat.style.width = size + 'px';
                splat.style.height = size + 'px';

                splat.style.left = x + 'px';
                splat.style.top = y + 'px';

                const tx = (Math.random() - 0.5) * 150 + 'px';
                const ty = (Math.random() - 0.5) * 150 + 'px';
                splat.style.setProperty('--tx', tx);
                splat.style.setProperty('--ty', ty);

                splat.style.animation = `splatter ${0.4 + Math.random() * 0.4}s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
                document.getElementById('render-frame').appendChild(splat);
                setTimeout(() => splat.remove(), 1000);
            }
        }

        // Core Engine: Convert Text to Per-Letter SVG Nodes
        function updateSVGNodes() {
            const rawText = document.getElementById('val-text').value;
            const container = document.getElementById('svg-content-group');
            container.innerHTML = ''; // Clear

            const lines = rawText.split('\n');
            const align = document.getElementById('val-align').value;
            const fontSize = document.getElementById('val-size').value;
            const spacing = document.getElementById('val-spacing').value;
            const lineHeight = document.getElementById('val-lineheight').value;

            // X position logic based on alignment
            let anchorX = '50%';
            if (align === 'start') anchorX = '10%';
            if (align === 'end') anchorX = '90%';

            // Y Starting Point (Centered vertically)
            let startY = 540 - ((lines.length - 1) * lineHeight) / 2;

            let globalCharIndex = 0; // for continuous delay sequence

            lines.forEach((lineText, lineIdx) => {
                const yPos = startY + (lineIdx * lineHeight);

                // SVG <text> tag as a wrapper for <tspan> so kerning text can flow horizontally properly
                // Since SVG kerning on separate text tags requires calculating actual bbox widths which is hard
                // We use dx attribute on tspans!

                const textWrapper = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                textWrapper.setAttribute('x', anchorX);
                textWrapper.setAttribute('y', yPos);
                textWrapper.setAttribute('text-anchor', align);
                textWrapper.style.fontSize = fontSize + 'px';
                textWrapper.style.letterSpacing = spacing + 'px';

                [...lineText].forEach((char, charIdx) => {
                    const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
                    tspan.textContent = char;
                    tspan.setAttribute('class', 'draw-text');
                    tspan.setAttribute('data-index', globalCharIndex);

                    // Maintain space parsing
                    if (char === ' ') {
                        tspan.setAttribute('xml:space', 'preserve');
                    }

                    textWrapper.appendChild(tspan);
                    globalCharIndex++;
                });

                container.appendChild(textWrapper);
            });
        }

        function updatePreview(triggerId) {
            // Update labels
            if (triggerId) {
                const val = document.getElementById(`val-${triggerId}`).value;
                document.getElementById(`label-${triggerId}`).innerText = val;
            }
            // Rebuild
            updateSVGNodes();
        }

        function updateGlow() {
            const ogSize = document.getElementById('val-og-size').value;
            const ogOpacity = document.getElementById('val-og-opacity').value;
            const igSize = document.getElementById('val-ig-size').value;
            const igOpacity = document.getElementById('val-ig-opacity').value;

            document.getElementById('label-og-size').innerText = ogSize;
            document.getElementById('label-og-opacity').innerText = ogOpacity;
            document.getElementById('label-ig-size').innerText = igSize;
            document.getElementById('label-ig-opacity').innerText = igOpacity;

            document.getElementById('fe-blur').setAttribute('stdDeviation', ogSize);
            document.getElementById('fe-opacity').setAttribute('slope', ogOpacity);
            document.getElementById('fe-inner-blur').setAttribute('stdDeviation', igSize);
            document.getElementById('fe-inner-opacity').setAttribute('slope', igOpacity);
        }

        // Animation Execution
        function startAnimation() {
            // Clear old splatters just in case
            document.querySelectorAll('.ink-splat').forEach(el => el.remove());

            const chars = document.querySelectorAll('.draw-text');
            const speedMs = parseInt(document.getElementById('val-speed').value);

            // Reset state
            chars.forEach(char => {
                char.classList.remove('animate-stroke');
                void char.offsetWidth; // Force Reflow
            });

            // Calculate timing for each character
            chars.forEach((char) => {
                const index = parseInt(char.getAttribute('data-index'));
                const delay = index * speedMs; // Delay per letter

                // Skip animation logic for blank spaces
                if (char.textContent === ' ') return;

                setTimeout(() => {
                    char.classList.add('animate-stroke');

                    // Trigger ink splatter exactly when the "Fill Gold" animation ends
                    // Stroke takes 1s, Fill takes 0.8s starting at 1.0s. Total = 1.8s
                    setTimeout(() => {
                        const bbox = char.getBoundingClientRect(); // Get pixel position of character
                        const frameRect = document.getElementById('render-frame').getBoundingClientRect();

                        // Convert browser absolute coords to relative coords inside the scaled render-frame
                        // Important for correct splatter positioning
                        const relativeX = (bbox.right - frameRect.left) * 2; // multiply by 2 because frame is scale(0.5)
                        const relativeY = (bbox.top + bbox.height / 2 - frameRect.top) * 2;

                        // Fire splatter at the tail end of the letter
                        createSplatter(relativeX - (Math.random() * 20), relativeY);
                    }, 1500); // 1.5s after letter starts drawing

                }, delay);
            });
        }

        // Export Simulation
        function simulateRender() {
            const overlay = document.getElementById('render-overlay');
            const bar = document.getElementById('progress-bar');
            overlay.style.display = 'flex';
            bar.style.width = '0%';

            startAnimation(); // Start the drawing process

            let progress = 0;
            const interval = setInterval(() => {
                progress += 1;
                bar.style.width = progress + '%';

                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        alert('Render Selesai!\n\n(Simulasi) File "sequence_4K_30fps.zip" telah siap. Di dalam pipeline asli, web akan mengekstrak frame per milidetik menggunakan Canvas to Blob lalu melemparnya ke FFmpeg.wasm atau trigger API Backend.');
                    }, 500);
                }
            }, 100); // Simulate 10s render process
        }

        // Init Layout
        updatePreview();
        setTimeout(startAnimation, 500);
    </script>
</body>

</html>
